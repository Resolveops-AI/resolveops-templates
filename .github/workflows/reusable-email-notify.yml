name: Reusable — Email Notification

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service that triggered this notification"
        required: true
        type: string
      status:
        description: "Status: success or failure"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: false
        default: "dev"
        type: string
      run_url:
        description: "GitHub Actions run URL"
        required: false
        default: ""
        type: string
      notification_service_url:
        description: "URL of the resolveops notification-service"
        required: false
        default: ""
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send pipeline status notification
        if: ${{ inputs.notification_service_url != '' }}
        run: |
          curl -X POST "${{ inputs.notification_service_url }}/api/v1/notify/pipeline" \
            -H "Content-Type: application/json" \
            -d '{
              "service": "${{ inputs.service_name }}",
              "status": "${{ inputs.status }}",
              "environment": "${{ inputs.environment }}",
              "run_url": "${{ inputs.run_url }}"
            }' || echo "Notification service unavailable"
