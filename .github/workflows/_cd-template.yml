# DEPRECATED: This workflow will be removed. Please use the new reusable-* workflows.
name: CD Template

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      image-tag:
        required: true
        type: string
      environment:
        required: true
        type: string
      manifest_type:
        description: "helm or kustomize"
        required: true
        type: string
      update_key:
        description: "yq path or kustomize image key"
        required: true
        type: string
      target_dir:
        description: "Directory containing helm chart or kustomize base"
        required: true
        type: string
    secrets:
      HELM_REPO_PAT:
        required: false

jobs:
  cd:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Kustomize
        if: ${{ inputs.manifest_type == 'kustomize' }}
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.0.0"

      - name: Update Manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.manifest_type }}" == "helm" ]; then
             if [ "${{ inputs.environment }}" == "main" ]; then
               TARGET_FILE="${{ inputs.target_dir }}/values-prod.yaml"
             else
               TARGET_FILE="${{ inputs.target_dir }}/values-dev.yaml"
             fi
             echo "Updating Helm chart in $TARGET_FILE for ${{ inputs.service-name }}"
             yq e "${{ inputs.update_key }} = \"${{ inputs.image-tag }}\"" -i $TARGET_FILE
             git add $TARGET_FILE
          elif [ "${{ inputs.manifest_type }}" == "kustomize" ]; then
             echo "Updating Kustomize base in ${{ inputs.target_dir }} for ${{ inputs.service-name }}"
             cd ${{ inputs.target_dir }}
             kustomize edit set image "${{ inputs.update_key }}:${{ inputs.image-tag }}"
             cd -
             git add ${{ inputs.target_dir }}/kustomization.yaml
          fi

          git commit -m "chore: update ${{ inputs.service-name }} image tag to ${{ inputs.image-tag }} [skip ci]" || echo "No changes to commit"
          
          MAX_RETRIES=5
          RETRY_COUNT=0
          until git push origin ${{ inputs.environment }}; do
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "Failed to push after $MAX_RETRIES attempts."
              exit 1
            fi
            echo "Push failed due to conflict. Pulling with rebase and retrying in 5 seconds..."
            git pull --rebase origin ${{ inputs.environment }}
            sleep 5
          done
