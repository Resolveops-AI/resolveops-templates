name: Reusable — SonarQube Scan

on:
  workflow_call:
    inputs:
      sonar_project_key:
        description: "SonarQube project key (if not using sonar-project.properties)"
        required: false
        type: string
      sonar_project_name:
        description: "SonarQube project name (if not using sonar-project.properties)"
        required: false
        type: string
    secrets:
      SONAR_TOKEN:
        description: "SonarQube Token"
        required: true
      SONAR_HOST_URL:
        description: "SonarQube Host URL"
        required: true

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for sonar-project.properties
        id: check-properties
        run: |
          if [ -f "sonar-project.properties" ]; then
            echo "has_properties=true" >> $GITHUB_OUTPUT
          else
            echo "has_properties=false" >> $GITHUB_OUTPUT
          fi

      - name: SonarQube Scan (with properties file)
        if: steps.check-properties.outputs.has_properties == 'true'
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Scan (without properties file)
        if: steps.check-properties.outputs.has_properties == 'false'
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.sonar_project_name }}
