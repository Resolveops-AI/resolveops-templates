# DEPRECATED: This workflow will be removed. Please use the new reusable-* workflows.
name: SAST Scan

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing the source code"
        required: false
        type: string
        default: "."
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Generate Coverage Report
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov fastapi httpx
          cd services/api-gateway-service
          pip install -r requirements.txt || true
          pytest --cov=. --cov-report=xml || true
          
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Upload Sonar Scanner Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-scanner-data-${{ github.sha }}
          path: ${{ inputs.working_directory }}/.scannerwork

      - name: Generate SonarCloud HTML Report
        if: always()
        run: |
          cat << 'EOF' > sonar-report.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>SonarCloud Report</title>
              <style>
                  body { font-family: Arial, sans-serif; padding: 40px; }
                  .card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; max-width: 600px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
                  .btn { display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; margin-top: 20px; }
              </style>
          </head>
          <body>
              <div class="card">
                  <h2>SonarCloud Code Analysis Complete</h2>
                  <p>Your code has been successfully scanned by SonarCloud.</p>
                  <p>Because SonarCloud is a cloud-based platform, the full interactive report (including Security, Coverage, and Bugs) is hosted securely on their dashboard.</p>
                  <a href="https://sonarcloud.io/dashboard?id=Resolveops-AI_resolveops-application" class="btn" target="_blank">View Full Interactive Report on SonarCloud</a>
              </div>
          </body>
          </html>
          EOF

      - name: Upload Sonar HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-html-report-${{ github.sha }}
          path: sonar-report.html
