# DEPRECATED: This workflow will be removed. Please use the new reusable-* workflows.
name: SCA Scan

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing the source code"
        required: false
        type: string
        default: "."
      service_name:
        description: "Name of the service for unique artifacts"
        required: false
        type: string
        default: "app"
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Snyk CLI and snyk-to-html
        run: npm install -g snyk snyk-to-html
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
      - name: Snyk Test
        run: snyk test --all-projects --severity-threshold=critical --skip-unresolved --json > snyk-report.json
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=${{ inputs.working_directory }}/requirements.txt --json-file-output=${{ inputs.working_directory }}/snyk.json
          
      - name: Generate Snyk HTML Report
        if: always()
        run: |
          npm install -g snyk-to-html
          snyk-to-html -i ${{ inputs.working_directory }}/snyk.json -o ${{ inputs.working_directory }}/snyk-report.html || true

      - name: Upload Snyk HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-html-report-${{ github.sha }}
          path: ${{ inputs.working_directory }}/snyk-report.html
