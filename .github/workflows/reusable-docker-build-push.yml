name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Name of the Docker image"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
      context_path:
        description: "Docker build context directory"
        required: false
        default: "."
        type: string
      acr_name:
        description: "Azure Container Registry Name"
        required: true
        type: string
      acr_login_server:
        description: "Azure Container Registry login server"
        required: true
        type: string
      image_tag:
        description: "Docker image tag"
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        description: "Azure Client ID for OIDC"
        required: true
      AZURE_TENANT_ID:
        description: "Azure Tenant ID for OIDC"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID for OIDC"
        required: true

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ inputs.acr_name }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.image_tag }} \
            -t ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:dev \
            -f ${{ inputs.dockerfile_path }} \
            ${{ inputs.context_path }}

      - name: Push Docker Image
        run: |
          docker push ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
          docker push ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:dev
