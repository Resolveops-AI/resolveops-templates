name: Reusable Docker Build and Push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: 'Name of the Docker image'
      image_tag:
        required: true
        type: string
        description: 'Tag for the Docker image (e.g., dev-<sha> or v1.0.0)'
      acr_name:
        required: true
        type: string
        description: 'Azure Container Registry name'
      acr_login_server:
        required: true
        type: string
        description: 'ACR Login Server (e.g., myacr.azurecr.io)'
      dockerfile_path:
        required: false
        type: string
        default: 'Dockerfile'
        description: 'Path to the Dockerfile'
      context_path:
        required: false
        type: string
        default: '.'
        description: 'Docker build context path'
      push_latest:
        required: false
        type: boolean
        default: false
        description: 'Whether to push the latest tag'
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Image Tag
        run: |
          if [ -z "${{ inputs.image_tag }}" ]; then
            echo "Error: image_tag cannot be empty."
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ inputs.acr_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Immutable Tag
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context_path }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.image_tag }}

      - name: Build and Push Latest Tag
        if: ${{ inputs.push_latest == true }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context_path }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:latest
