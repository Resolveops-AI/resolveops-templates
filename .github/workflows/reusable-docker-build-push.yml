name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the source code"
        required: false
        type: string
        default: "."
      image-name:
        description: "Name of the Docker image"
        required: true
        type: string
      dockerfile-path:
        description: "Path to Dockerfile relative to context"
        required: false
        type: string
        default: "Dockerfile"
      context-path:
        description: "Docker build context directory"
        required: false
        type: string
        default: "."
      acr-login-server:
        description: "Azure Container Registry login server"
        required: true
        type: string
      environment:
        description: "Target environment (e.g., dev, prod)"
        required: false
        type: string
        default: "dev"
    secrets:
      AZURE_CLIENT_ID:
        description: "Azure Client ID for OIDC"
        required: true
      AZURE_TENANT_ID:
        description: "Azure Tenant ID for OIDC"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID for OIDC"
        required: true

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ inputs.acr-login-server }}

      - name: Build Docker Image
        run: |
          IMAGE_URI="${{ inputs.acr-login-server }}/${{ inputs.image-name }}"
          docker build \
            -t $IMAGE_URI:${{ github.sha }} \
            -t $IMAGE_URI:latest \
            -f ${{ inputs.dockerfile-path }} \
            ${{ inputs.context-path }}

      - name: Push Docker Image
        run: |
          IMAGE_URI="${{ inputs.acr-login-server }}/${{ inputs.image-name }}"
          docker push $IMAGE_URI:${{ github.sha }}
          docker push $IMAGE_URI:latest
