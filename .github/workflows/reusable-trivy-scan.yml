name: Reusable Trivy Scan

on:
  workflow_call:
    inputs:
      image-name:
        description: "Name of the Docker image to scan"
        required: true
        type: string
      acr-login-server:
        description: "Azure Container Registry login server"
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        description: "Azure Client ID for OIDC"
        required: true
      AZURE_TENANT_ID:
        description: "Azure Tenant ID for OIDC"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID for OIDC"
        required: true

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ inputs.acr-login-server }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ inputs.acr-login-server }}/${{ inputs.image-name }}:${{ github.sha }}"
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
