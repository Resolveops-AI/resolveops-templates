name: Reusable — Build, Scan & Push to ACR

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service (used as Docker image name)"
        required: true
        type: string
      docker_context:
        description: "Docker build context directory"
        required: false
        default: "."
        type: string
      image_tag:
        description: "Docker image tag (default: github.sha)"
        required: false
        default: "latest"
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
    secrets:
      ACR_LOGIN_SERVER:
        description: "Azure Container Registry login server (e.g. resolveopsai.azurecr.io)"
        required: true
      ACR_USERNAME:
        description: "ACR username"
        required: true
      ACR_PASSWORD:
        description: "ACR password"
        required: true

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.docker_context }}/${{ inputs.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service_name }}:${{ inputs.image_tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ secrets.ACR_LOGIN_SERVER }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
