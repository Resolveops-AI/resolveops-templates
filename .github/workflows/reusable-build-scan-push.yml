name: Reusable — Build, Scan & Push to ACR

on:
  workflow_call:
    inputs:
      image_name:
        description: "Name of the Docker image"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
      context_path:
        description: "Docker build context directory"
        required: false
        default: "."
        type: string
      acr_login_server:
        description: "Azure Container Registry login server"
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        description: "Azure Client ID for OIDC"
        required: true
      AZURE_TENANT_ID:
        description: "Azure Tenant ID for OIDC"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID for OIDC"
        required: true
      SNYK_TOKEN:
        description: "Snyk token for image scanning"
        required: true

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Extract ACR Name
        id: acr-name
        run: |
          ACR_NAME=$(echo ${{ inputs.acr_login_server }} | cut -d'.' -f1)
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ github.sha }} \
            -t ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:latest \
            -f ${{ inputs.dockerfile_path }} \
            ${{ inputs.context_path }}

      - name: Scan Docker Image with Snyk
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ github.sha }}
          args: --file=${{ inputs.dockerfile_path }} --severity-threshold=high

      - name: Push Docker Image
        run: |
          docker push ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ github.sha }}
          docker push ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:latest
