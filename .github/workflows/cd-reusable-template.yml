name: Reusable ArgoCD Sync

on:
  workflow_call:
    inputs:
      argocd_app_name:
        description: "ArgoCD Application Name to sync"
        required: true
        type: string
      argocd_server:
        description: "ArgoCD Server URL (e.g., argocd.example.com)"
        required: true
        type: string
      timeout:
        description: "Timeout in seconds to wait for sync completion"
        required: false
        type: number
        default: 300
    secrets:
      ARGOCD_AUTH_TOKEN:
        description: "ArgoCD Auth Token"
        required: true

jobs:
  argocd-sync:
    name: Sync ArgoCD Application
    runs-on: ubuntu-latest
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Sync Application
        run: |
          argocd app sync ${{ inputs.argocd_app_name }} \
            --server ${{ inputs.argocd_server }} \
            --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
            --grpc-web

      - name: Wait for Application Rollout
        run: |
          argocd app wait ${{ inputs.argocd_app_name }} \
            --server ${{ inputs.argocd_server }} \
            --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
            --grpc-web \
            --timeout ${{ inputs.timeout }}
