name: Dockerfile Security Check

on:
  workflow_call:
    inputs:
      dockerfile_path:
        required: true
        type: string
        description: 'Path to the Dockerfile'

jobs:
  dockerfile-check:
    name: Dockerfile Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Check Non-Root User
        run: |
          if [ -f "${{ inputs.dockerfile_path }}" ]; then
            if ! grep -Eqi '^[[:space:]]*USER[[:space:]]+(10001|101|nextjs)' "${{ inputs.dockerfile_path }}"; then
              echo "Error: Dockerfile must run as non-root. Allowed users: 10001, 101, nextjs."
              echo "--- Dockerfile Contents ---"
              cat "${{ inputs.dockerfile_path }}"
              exit 1
            fi
            echo "Dockerfile passed security check."
          else
            echo "Dockerfile not found at ${{ inputs.dockerfile_path }}, skipping."
          fi
