name: Reusable Helm Values Update

on:
  workflow_call:
    inputs:
      values_file:
        description: "Path to the Helm values file to update"
        required: true
        type: string
      image_repository_key:
        description: "The YAML key path for the image repository (e.g. 'image.repository')"
        required: false
        type: string
      image_tag_key:
        description: "The YAML key path for the image tag (e.g. 'image.tag')"
        required: true
        type: string
      image_repository:
        description: "The new image repository value"
        required: false
        type: string
      image_tag:
        description: "The new image tag value"
        required: true
        type: string
      commit_message:
        description: "Commit message for the update (must include [skip ci])"
        required: true
        type: string
      branch_name:
        description: "The branch name to push changes back to"
        required: true
        type: string

jobs:
  update-helm-values:
    name: Update Helm Values Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_name }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Values File
        run: |
          # Strip any leading dots from keys to prevent double-dot issues in yq path expression
          REPO_KEY="${{ inputs.image_repository_key }}"
          REPO_KEY="${REPO_KEY#.}"
          TAG_KEY="${{ inputs.image_tag_key }}"
          TAG_KEY="${TAG_KEY#.}"

          if [ -n "$REPO_KEY" ]; then
            echo "Updating ${{ inputs.values_file }} keys: .${REPO_KEY} -> ${{ inputs.image_repository }}"
            yq -i ".${REPO_KEY} = \"${{ inputs.image_repository }}\"" ${{ inputs.values_file }}
          fi
          echo "Updating ${{ inputs.values_file }} keys: .${TAG_KEY} -> ${{ inputs.image_tag }}"
          yq -i ".${TAG_KEY} = \"${{ inputs.image_tag }}\"" ${{ inputs.values_file }}

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.values_file }}
          
          # Force inclusion of [skip ci] if it's not already in the commit message
          MSG="${{ inputs.commit_message }}"
          if [[ ! "$MSG" =~ "[skip ci]" ]]; then
            MSG="$MSG [skip ci]"
          fi
          
          git commit -m "$MSG"
          git push origin ${{ inputs.branch_name }}
