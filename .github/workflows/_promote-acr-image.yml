name: Promote ACR Image

on:
  workflow_call:
    inputs:
      acr_login_server:
        required: true
        type: string
        description: 'ACR Login Server'
      image_name:
        required: true
        type: string
        description: 'Docker image name'
      source_image_tag:
        required: true
        type: string
        description: 'Source Docker image tag to pull'
      target_image_tag:
        required: true
        type: string
        description: 'Target Docker image tag to push'
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          ACR_NAME=$(echo ${{ inputs.acr_login_server }} | cut -d'.' -f1)
          az acr login --name $ACR_NAME

      - name: Pull Image
        run: docker pull ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.source_image_tag }}

      - name: Retag Image
        run: docker tag ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.source_image_tag }} ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.target_image_tag }}

      - name: Push Image
        run: docker push ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.target_image_tag }}
