name: Promote ACR Image

on:
  workflow_call:
    inputs:
      image_name:
        description: "Name of the Docker image"
        required: true
        type: string
      source_tag:
        description: "Source tag to promote (e.g., dev-<sha>)"
        required: true
        type: string
      target_tag:
        description: "Target tag to apply (e.g., v1.0.0)"
        required: true
        type: string
      acr_name:
        description: "Azure Container Registry Name"
        required: true
        type: string

jobs:
  promote:
    name: Promote Image
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retag Image in ACR
        run: |
          echo "Promoting ${{ inputs.image_name }}:${{ inputs.source_tag }} to ${{ inputs.image_name }}:${{ inputs.target_tag }}"
          
          # Use az acr import to retag within the same registry instantly without downloading
          az acr import \
            --name ${{ inputs.acr_name }} \
            --source ${{ inputs.acr_name }}.azurecr.io/${{ inputs.image_name }}:${{ inputs.source_tag }} \
            --image ${{ inputs.image_name }}:${{ inputs.target_tag }} \
            --force
          
          echo "✅ Promotion successful!"
