name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing the source code"
        required: false
        type: string
        default: "."
      image_name:
        description: "Optional name of the project/image for scanner context"
        required: false
        type: string
      image_tag:
        description: "Optional image tag for scanner context"
        required: false
        type: string
      run_sonar:
        description: "Enable SonarQube scan"
        required: false
        type: boolean
        default: false
      run_snyk:
        description: "Enable Snyk scan"
        required: false
        type: boolean
        default: false
      run_trivy:
        description: "Enable Trivy filesystem scan"
        required: false
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        description: "SonarQube token (required if run_sonar is true)"
        required: false
      SONAR_HOST_URL:
        description: "SonarQube host URL (required if run_sonar is true)"
        required: false
      SNYK_TOKEN:
        description: "Snyk token (required if run_snyk is true)"
        required: false

jobs:
  security-scan:
    name: Unified Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- SonarQube Scan ---
      - name: SonarQube Scan
        if: ${{ inputs.run_sonar == true }}
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # --- Snyk Scan ---
      - name: Install Snyk CLI
        if: ${{ inputs.run_snyk == true }}
        run: npm install -g snyk
        continue-on-error: true

      - name: Authenticate Snyk
        if: ${{ inputs.run_snyk == true }}
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Snyk Vulnerability Scan
        if: ${{ inputs.run_snyk == true }}
        run: snyk test --all-projects --severity-threshold=high --skip-unresolved
        continue-on-error: true

      # --- Trivy Filesystem Scan ---
      - name: Run Trivy Scan
        if: ${{ inputs.run_trivy == true }}
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: ${{ inputs.working_directory }}
          format: "template"
          template: "@/contrib/html.tpl"
          output: "trivy-report.html"
          exit-code: "1" # Fail the workflow on critical/high vulnerabilities
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy Report Artifact
        if: ${{ inputs.run_trivy == true && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report-${{ github.sha }}
          path: trivy-report.html
