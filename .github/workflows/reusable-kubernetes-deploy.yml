name: Reusable Kubernetes Deploy

on:
  workflow_call:
    inputs:
      aks_resource_group:
        description: "Azure Resource Group of the AKS cluster"
        required: true
        type: string
      aks_cluster_name:
        description: "Name of the AKS cluster"
        required: true
        type: string
      namespace:
        description: "Kubernetes namespace to deploy into"
        required: true
        type: string
      manifest_path:
        description: "Path to the Kubernetes manifests directory or file"
        required: true
        type: string
      kubectl_timeout:
        description: "Timeout for kubectl rollout status"
        required: false
        type: string
        default: "5m"
      deployment_name:
        description: "Deployment name to wait for rollout status (optional)"
        required: false
        type: string
    secrets:
      AZURE_CLIENT_ID:
        description: "Azure Client ID for OIDC"
        required: true
      AZURE_TENANT_ID:
        description: "Azure Tenant ID for OIDC"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID for OIDC"
        required: true

jobs:
  deploy:
    name: Deploy Manifests to AKS
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: az aks get-credentials --resource-group ${{ inputs.aks_resource_group }} --name ${{ inputs.aks_cluster_name }}

      - name: Create Namespace if Missing
        run: kubectl create namespace ${{ inputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes Manifests
        run: kubectl apply -n ${{ inputs.namespace }} -f ${{ inputs.manifest_path }}

      - name: Wait for Rollout Status
        if: ${{ inputs.deployment_name != '' }}
        run: kubectl rollout status deployment/${{ inputs.deployment_name }} -n ${{ inputs.namespace }} --timeout=${{ inputs.kubectl_timeout }}

      - name: Print Resources
        run: |
          echo "========================================"
          echo "Pods in namespace: ${{ inputs.namespace }}"
          echo "========================================"
          kubectl get pods -n ${{ inputs.namespace }}
          echo ""
          echo "========================================"
          echo "Services in namespace: ${{ inputs.namespace }}"
          echo "========================================"
          kubectl get svc -n ${{ inputs.namespace }}
