name: Docker Build and Scan

on:
  workflow_call:
    inputs:
      image_name:
        description: "Name of the Docker image"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile relative to context"
        required: true
        type: string
      context_path:
        description: "Docker build context directory"
        required: true
        type: string
    outputs:
      trivy_critical:
        description: "Whether Trivy found critical vulnerabilities"
        value: ${{ jobs.build-and-scan.outputs.trivy_critical }}

jobs:
  build-and-scan:
    name: Build & Trivy Scan
    runs-on: ubuntu-latest
    outputs:
      trivy_critical: ${{ steps.trivy.outputs.critical }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image (Local)
        run: |
          docker build \
            -t ${{ inputs.image_name }}:local \
            -f ${{ inputs.dockerfile_path }} \
            ${{ inputs.context_path }}

      - name: Run Trivy Image Scan
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ inputs.image_name }}:local"
          format: "template"
          template: "@/contrib/html.tpl"
          output: "trivy-report.html"
          exit-code: "1" # Fail the workflow on critical/high vulnerabilities
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ inputs.image_name }}-${{ github.sha }}
          path: trivy-report.html
