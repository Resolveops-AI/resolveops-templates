name: Trivy Scan ACR Image

on:
  workflow_call:
    inputs:
      acr_login_server:
        required: true
        type: string
        description: 'ACR Login Server'
      image_name:
        required: true
        type: string
        description: 'Docker image name'
      image_tag:
        required: true
        type: string
        description: 'Docker image tag to scan'
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          ACR_NAME=$(echo ${{ inputs.acr_login_server }} | cut -d'.' -f1)
          az acr login --name $ACR_NAME

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.image_tag }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
