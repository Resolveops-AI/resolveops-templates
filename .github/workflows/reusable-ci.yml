name: Reusable CI Workflow

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service"
        required: true
        type: string
      image_name:
        description: "Name of the Docker image"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
      context_path:
        description: "Docker build context directory"
        required: false
        default: "."
        type: string
      acr_login_server:
        description: "Azure Container Registry login server"
        required: true
        type: string
      service_type:
        description: "Type of service for Snyk (node, python)"
        required: true
        type: string
      sonar_project_key:
        description: "SonarQube project key"
        required: false
        type: string
      sonar_project_name:
        description: "SonarQube project name"
        required: false
        type: string
    secrets:
      SONAR_TOKEN:
        description: "SonarQube Token"
        required: true
      SONAR_HOST_URL:
        description: "SonarQube Host URL"
        required: true
      SNYK_TOKEN:
        description: "Snyk API Token"
        required: true
      AZURE_CLIENT_ID:
        description: "Azure Client ID for OIDC"
        required: true
      AZURE_TENANT_ID:
        description: "Azure Tenant ID for OIDC"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID for OIDC"
        required: true

jobs:
  sonarqube:
    uses: Resolveops-AI/resolveops-templates/.github/workflows/reusable-sonarqube.yml@main
    with:
      sonar_project_key: ${{ inputs.sonar_project_key || inputs.service_name }}
      sonar_project_name: ${{ inputs.sonar_project_name || inputs.service_name }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  snyk-code:
    needs: sonarqube
    uses: Resolveops-AI/resolveops-templates/.github/workflows/reusable-snyk.yml@main
    with:
      service_type: ${{ inputs.service_type }}
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-scan-push:
    needs: [sonarqube, snyk-code]
    uses: Resolveops-AI/resolveops-templates/.github/workflows/reusable-build-scan-push.yml@main
    with:
      image_name: ${{ inputs.image_name }}
      dockerfile_path: ${{ inputs.dockerfile_path }}
      context_path: ${{ inputs.context_path }}
      acr_login_server: ${{ inputs.acr_login_server }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
