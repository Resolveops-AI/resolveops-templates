# DEPRECATED: This workflow will be removed. Please use the new reusable-* workflows.
name: Docker Publish

on:
  workflow_call:
    inputs:
      image_name:
        description: "Name of the Docker image"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile relative to context"
        required: true
        type: string
      context_path:
        description: "Docker build context directory"
        required: true
        type: string
      acr_name:
        description: "Azure Container Registry name"
        required: true
        type: string
      acr_login_server:
        description: "Azure Container Registry login server"
        required: true
        type: string
      image_tag:
        description: "Image tag to build and push"
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

jobs:
  publish:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ inputs.acr_name }}

      - name: Build Docker Image
        run: |
          IMAGE_URI="${{ inputs.acr_login_server }}/${{ inputs.image_name }}"
          docker build \
            -t $IMAGE_URI:${{ inputs.image_tag }} \
            -f ${{ inputs.dockerfile_path }} \
            ${{ inputs.context_path }}

      - name: Push Docker Image
        run: |
          IMAGE_URI="${{ inputs.acr_login_server }}/${{ inputs.image_name }}"
          docker push $IMAGE_URI:${{ inputs.image_tag }}
