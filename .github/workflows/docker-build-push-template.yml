name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Name of the Docker image"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile relative to context"
        required: true
        type: string
      context_path:
        description: "Docker build context directory"
        required: true
        type: string
      acr_name:
        description: "Azure Container Registry name"
        required: true
        type: string
      acr_login_server:
        description: "Azure Container Registry login server"
        required: true
        type: string
      image_tag:
        description: "Image tag to build and push"
        required: true
        type: string
      push_latest:
        description: "Whether to also push the 'latest' tag"
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        description: "Azure Client ID for OIDC"
        required: true
      AZURE_TENANT_ID:
        description: "Azure Tenant ID for OIDC"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID for OIDC"
        required: true

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ inputs.acr_name }}

      - name: Build Docker Image
        run: |
          IMAGE_URI="${{ inputs.acr_login_server }}/${{ inputs.image_name }}"
          docker build \
            -t $IMAGE_URI:${{ inputs.image_tag }} \
            -t $IMAGE_URI:latest \
            -f ${{ inputs.dockerfile_path }} \
            ${{ inputs.context_path }}

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Push Docker Image (with specific tag)
        run: |
          IMAGE_URI="${{ inputs.acr_login_server }}/${{ inputs.image_name }}"
          docker push $IMAGE_URI:${{ inputs.image_tag }}

      - name: Push Docker Image (with latest tag)
        if: ${{ inputs.push_latest == true }}
        run: |
          IMAGE_URI="${{ inputs.acr_login_server }}/${{ inputs.image_name }}"
          docker push $IMAGE_URI:latest
