name: Reusable — Deploy to AKS

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name"
        required: true
        type: string
      environment:
        description: "Target environment: dev or prod"
        required: false
        default: "dev"
        type: string
      image_tag:
        description: "Docker image tag to deploy"
        required: true
        type: string
      k8s_namespace:
        description: "Kubernetes namespace"
        required: false
        default: "resolveops-ai-dev"
        type: string
    secrets:
      KUBECONFIG_DATA:
        description: "Base64-encoded kubeconfig"
        required: true
      ACR_LOGIN_SERVER:
        description: "ACR login server"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout resolveops-config
        uses: actions/checkout@v4
        with:
          repository: Resolveops-AI/resolveops-config
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Update image in deployment
        run: |
          kubectl set image deployment/${{ inputs.service_name }} \
            ${{ inputs.service_name }}=${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service_name }}:${{ inputs.image_tag }} \
            -n ${{ inputs.k8s_namespace }}
          kubectl rollout status deployment/${{ inputs.service_name }} -n ${{ inputs.k8s_namespace }}
