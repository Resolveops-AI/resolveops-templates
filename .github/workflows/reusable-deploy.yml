name: Reusable — Deploy to AKS

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name"
        required: true
        type: string
      environment:
        description: "Target environment: dev or prod"
        required: false
        default: "dev"
        type: string
      image_tag:
        description: "Docker image tag to deploy"
        required: true
        type: string
      k8s_namespace:
        description: "Kubernetes namespace"
        required: false
        default: "resolveops-ai-dev"
        type: string
      azure_resource_group:
        description: "Azure Resource Group"
        required: false
        default: "resolveops-rg"
        type: string
      aks_cluster_name:
        description: "AKS Cluster Name"
        required: false
        default: "resolveops-aks"
        type: string
    secrets:
      AZURE_CLIENT_ID:
        description: "Azure Client ID"
        required: true
      AZURE_TENANT_ID:
        description: "Azure Tenant ID"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID"
        required: true
      ACR_LOGIN_SERVER:
        description: "ACR login server"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: az aks get-credentials --resource-group ${{ inputs.azure_resource_group }} --name ${{ inputs.aks_cluster_name }}

      - name: Update image in deployment
        run: |
          kubectl set image deployment/${{ inputs.service_name }} \
            ${{ inputs.service_name }}=${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service_name }}:${{ inputs.image_tag }} \
            -n ${{ inputs.k8s_namespace }}
          kubectl rollout status deployment/${{ inputs.service_name }} -n ${{ inputs.k8s_namespace }}
