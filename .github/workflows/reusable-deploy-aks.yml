name: Reusable Deploy to AKS

on:
  workflow_call:
    inputs:
      azure_resource_group:
        description: "Azure Resource Group"
        required: true
        type: string
      aks_cluster_name:
        description: "AKS Cluster Name"
        required: true
        type: string
      namespace:
        description: "Kubernetes Namespace"
        required: true
        type: string
      kustomize_path:
        description: "Path to Kustomize directory"
        required: true
        type: string
      deployment_names:
        description: "Space-separated list of deployments to wait for rollout"
        required: true
        type: string
      smoke_test_command:
        description: "Optional smoke test command to run after deployment"
        required: false
        type: string
    secrets:
      AZURE_CLIENT_ID:
        description: "Azure Client ID for OIDC"
        required: true
      AZURE_TENANT_ID:
        description: "Azure Tenant ID for OIDC"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID for OIDC"
        required: true

jobs:
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: az aks get-credentials --resource-group ${{ inputs.azure_resource_group }} --name ${{ inputs.aks_cluster_name }}

      - name: Create Namespace if it does not exist
        run: kubectl create namespace ${{ inputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Kustomize
        run: kubectl apply -k ${{ inputs.kustomize_path }}

      - name: Wait for Rollout Status
        run: |
          for deployment in ${{ inputs.deployment_names }}; do
            kubectl rollout status deployment/$deployment -n ${{ inputs.namespace }}
          done

      - name: Verify Resources
        run: |
          echo "Listing Pods, Services, and Ingress resources in namespace ${{ inputs.namespace }}"
          kubectl get pods,services,ingress -n ${{ inputs.namespace }}

      - name: Run Smoke Test
        if: inputs.smoke_test_command != ''
        run: ${{ inputs.smoke_test_command }}
