name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing the source code"
        required: false
        type: string
        default: "."
      image_name:
        description: "Optional name of the project/image for scanner context"
        required: false
        type: string
      image_tag:
        description: "Optional image tag for scanner context"
        required: false
        type: string
      run_sonar:
        description: "Enable SonarQube scan"
        required: false
        type: boolean
        default: true
      run_snyk:
        description: "Enable Snyk scan"
        required: false
        type: boolean
        default: true
      run_trivy:
        description: "Enable Trivy filesystem scan"
        required: false
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        description: "SonarQube token (required if run_sonar is true)"
        required: false
      SONAR_HOST_URL:
        description: "SonarQube host URL (required if run_sonar is true)"
        required: false
      SNYK_TOKEN:
        description: "Snyk token (required if run_snyk is true)"
        required: false

jobs:
  security-scan:
    name: Unified Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- SonarQube Scan ---
      - name: Check for sonar-project.properties
        id: check-properties
        if: ${{ inputs.run_sonar == true }}
        run: |
          if [ -f "sonar-project.properties" ]; then
            echo "has_properties=true" >> $GITHUB_OUTPUT
          else
            echo "has_properties=false" >> $GITHUB_OUTPUT
          fi

      - name: SonarQube Scan (with properties file)
        if: ${{ inputs.run_sonar == true && steps.check-properties.outputs.has_properties == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Scan (without properties file)
        if: ${{ inputs.run_sonar == true && steps.check-properties.outputs.has_properties == 'false' }}
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.image_name || github.event.repository.name }}
            -Dsonar.projectName=${{ inputs.image_name || github.event.repository.name }}

      # --- Snyk Scan ---
      - name: Install Snyk CLI
        if: ${{ inputs.run_snyk == true }}
        run: npm install -g snyk

      - name: Authenticate Snyk
        if: ${{ inputs.run_snyk == true }}
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Vulnerability Scan
        if: ${{ inputs.run_snyk == true }}
        run: snyk test --severity-threshold=high

      # --- Trivy Filesystem Scan ---
      - name: Run Trivy Filesystem Scan
        if: ${{ inputs.run_trivy == true }}
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: ${{ inputs.working_directory }}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
