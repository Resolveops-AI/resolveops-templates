name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service"
        required: true
        type: string
      service_type:
        description: "Type of the service (node or python)"
        required: true
        type: string
      working_directory:
        description: "Directory where the service code resides"
        required: false
        default: "."
        type: string
      severity_threshold:
        description: "Snyk severity threshold (low, medium, high, critical)"
        required: false
        default: "high"
        type: string
      image_ref:
        description: "Docker image reference for Trivy scan (optional)"
        required: false
        type: string
    secrets:
      SONAR_TOKEN:
        description: "SonarQube Token"
        required: true
      SONAR_HOST_URL:
        description: "SonarQube Host URL"
        required: true
      SNYK_TOKEN:
        description: "Snyk API Token"
        required: true

jobs:
  scan:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ${{ inputs.working_directory }}

      - name: Set up Node.js
        if: inputs.service_type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        if: inputs.service_type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Node)
        if: inputs.service_type == 'node'
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Install dependencies (Python)
        if: inputs.service_type == 'python'
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code Scan
        working-directory: ${{ inputs.working_directory }}
        run: snyk test --severity-threshold=${{ inputs.severity_threshold }}

      - name: Run Trivy vulnerability scanner
        if: inputs.image_ref != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image_ref }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
