name: Verify ACR Image

on:
  workflow_call:
    inputs:
      image_name:
        description: "Name of the Docker image"
        required: true
        type: string
      image_tag:
        description: "Tag to verify (e.g., dev-<sha>)"
        required: true
        type: string
      acr_name:
        description: "Azure Container Registry Name"
        required: true
        type: string
      acr_login_server:
        description: "Azure Container Registry Login Server"
        required: true
        type: string

jobs:
  verify:
    name: Verify Image Exists
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Image in ACR
        id: verify-image
        run: |
          echo "Checking if image exists: ${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
          
          # Use Azure CLI to check repository tags
          EXISTS=$(az acr repository show-tags -n ${{ inputs.acr_name }} --repository ${{ inputs.image_name }} --query "contains(@, '${{ inputs.image_tag }}')" -o tsv)
          
          if [ "$EXISTS" == "true" ]; then
            echo "✅ Image ${{ inputs.image_name }}:${{ inputs.image_tag }} found in ACR."
          else
            echo "❌ ERROR: Image ${{ inputs.image_name }}:${{ inputs.image_tag }} NOT found in ACR!"
            echo "A successful Dev push must create the artifact before it can be verified or promoted."
            exit 1
          fi
